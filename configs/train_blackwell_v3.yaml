# SwarmRouter-4B-0 — Blackwell Training Config
# Hardware: RTX PRO 6000 Blackwell (96GB VRAM, sm_120)
# Target:   ~5 hours, ~4,300 steps, eff_batch=32

model:
  name: "Qwen/Qwen3.5-4B-Base"
  attn_implementation: "sdpa"      # DeltaNet hybrid: no flash_attn_2, use sdpa
  torch_dtype: "bfloat16"          # 96GB — no quantization needed

lora:
  r: 64
  alpha: 32
  dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: "checkpoints/swarmrouter-4b0-v1"
  per_device_train_batch_size: 8   # 96GB handles 4B easily at batch=8
  gradient_accumulation_steps: 4   # effective batch = 32
  num_train_epochs: 2
  max_length: 2048
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_steps: 100
  bf16: true
  fp16: false
  gradient_checkpointing: false    # 96GB — don't need it, saves time
  packing: true
  dataset_num_proc: 4
  neftune_noise_alpha: 5.0
  dataloader_num_workers: 4

  # Save checkpoints every 500 steps — 2+ per epoch, safe recovery points
  save_strategy: "steps"
  save_steps: 500
  save_total_limit: 4
  logging_steps: 50

  # Eval on the eval split
  eval_strategy: "steps"
  eval_steps: 500
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"

  # No WANDB — clean run
  report_to: "none"
